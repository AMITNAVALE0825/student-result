<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Result Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="login-panel" id="loginPanel">
      <div class="brand-block">
        <span class="brand-mark">SR</span>
        <div>
          <p class="eyebrow">Academic Portal</p>
          <h1>Student Result Management System</h1>
        </div>
      </div>

      <form class="login-form" id="loginForm">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" placeholder="Enter full name" required>

        <label for="registrationNo">Registration No / USN</label>
        <input type="text" id="registrationNo" placeholder="Example: 1EW25CS001" required>

        <label for="department">Department</label>
        <select id="department" required>
          <option value="">Select department</option>
          <option>Computer Science</option>
          <option>Information Science</option>
          <option>Electronics</option>
          <option>Mechanical</option>
          <option>Civil</option>
          <option>Commerce</option>
        </select>

        <label for="semester">Semester</label>
        <select id="semester" required>
          <option value="">Select semester</option>
          <option>1st Semester</option>
          <option>2nd Semester</option>
          <option>3rd Semester</option>
          <option>4th Semester</option>
          <option>5th Semester</option>
          <option>6th Semester</option>
          <option>7th Semester</option>
          <option>8th Semester</option>
        </select>

        <label for="studentPhoto">Student Photo</label>
        <input type="file" id="studentPhoto" accept="image/*">

        <button type="submit">Login to Profile</button>
      </form>
    </section>

    <section class="profile-panel hidden" id="profilePanel">
      <header class="topbar">
        <div class="student-summary">
          <img id="profilePhoto" src="" alt="Student profile photo">
          <div>
            <p class="eyebrow">Student Profile</p>
            <h2 id="profileName">Student Name</h2>
            <p id="profileMeta">USN | Department | Semester</p>
          </div>
        </div>
        <button class="secondary-button" id="logoutButton" type="button">Logout</button>
      </header>

      <section class="workspace">
        <form class="marks-panel" id="marksForm">
          <div class="section-heading">
            <p class="eyebrow">Internal Marks</p>
            <h3>Enter marks out of 100</h3>
          </div>

          <div class="marks-grid">
            <label>
              Mathematics
              <input class="mark-input" type="number" min="0" max="100" placeholder="0" required>
            </label>
            <label>
              C programming-2 with linux
              <input class="mark-input" type="number" min="0" max="100" placeholder="0" required>
            </label>
            <label>
              Digital logic design
              <input class="mark-input" type="number" min="0" max="100" placeholder="0" required>
            </label>
            <label>
              python programming
              <input class="mark-input" type="number" min="0" max="100" placeholder="0" required>
            </label>
            <label>
              IME
              <input class="mark-input" type="number" min="0" max="100" placeholder="0" required>
            </label>
          </div>

          <div class="actions">
            <button type="submit">Calculate Result</button>
            <button class="secondary-button" id="clearMarks" type="button">Clear Marks</button>
          </div>
        </form>

        <aside class="result-panel" id="resultPanel">
          <div class="section-heading">
            <p class="eyebrow">Result</p>
            <h3>Performance Summary</h3>
          </div>

          <div class="score-board">
            <div>
              <span>Total Marks</span>
              <strong id="totalMarks">--</strong>
            </div>
            <div>
              <span>Percentage</span>
              <strong id="percentage">--</strong>
            </div>
            <div>
              <span>Grade</span>
              <strong id="grade">--</strong>
            </div>
            <div>
              <span>Status</span>
              <strong id="status" class="status-pill">--</strong>
            </div>
          </div>

          <p class="note" id="resultNote">Enter all subject marks to generate the student result.</p>
        </aside>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
